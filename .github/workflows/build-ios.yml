name: Build iOS

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build iOS .app
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build iOS (profile mode, for sideloading)
        run: flutter build ios --profile --no-codesign

      - name: Create .ipa
        run: |
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -r ../../../life-log-app.ipa Payload/

      - name: Upload .ipa
        uses: actions/upload-artifact@v4
        with:
          name: life-log-app.ipa
          path: life-log-app.ipa

name: Build iOS

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build iOS .app
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build iOS
        run: |
          # 直接用 xcodebuild 编译，完全禁用签名
          cd ios
          xcodebuild -workspace Runner.xcworkspace -scheme Runner \
            -configuration Debug -sdk iphoneos -arch arm64 \
            CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            -derivedDataPath ../build/ios_derived

      - name: Create .ipa
        run: |
          # 从 DerivedData 找到 .app
          find build/ios_derived -name "Runner.app" -type d
          app_path=$(find build/ios_derived -name "Runner.app" -type d | head -1)
          echo "App found at: $app_path"
          dir_path=$(dirname "$app_path")
          cd "$dir_path"
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -r ../../../life-log-app.ipa Payload/

      - name: Upload .ipa
        uses: actions/upload-artifact@v4
        with:
          name: life-log-app.ipa
          path: life-log-app.ipa

name: Build iOS

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build iOS .app
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build iOS (debug mode, for sideloading)
        run: |
          # 在编译前注入空 DEVELOPMENT_TEAM 到所有 buildSettings
          sed -i '' 's/PRODUCT_BUNDLE_IDENTIFIER = com.selfapp.lifeLogApp;/PRODUCT_BUNDLE_IDENTIFIER = com.selfapp.lifeLogApp;\n\t\t\t\tDEVELOPMENT_TEAM = "";/g' ios/Runner.xcodeproj/project.pbxproj
          flutter build ios --debug --no-codesign

      - name: Create .ipa
        run: |
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -r ../../../life-log-app.ipa Payload/

      - name: Upload .ipa
        uses: actions/upload-artifact@v4
        with:
          name: life-log-app.ipa
          path: life-log-app.ipa

name: Build iOS

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build iOS .ipa
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build iOS
        run: flutter build ios --release --no-codesign

      - name: Create .ipa with xcrun
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          xcrun -sdk iphoneos ldid -S Payload/Runner.app/Runner 2>/dev/null || true
          zip -r life-log-app.ipa Payload/
          rm -rf Payload

      - name: Upload .ipa
        uses: actions/upload-artifact@v4
        with:
          name: life-log-app.ipa
          path: life-log-app.ipa
